name: Archive Cleanup

# Runs on the 1st of every month and removes archive items older than 2 years.
# Items from the current week (current-week.json) are never touched.

on:
  schedule:
    - cron: "0 0 1 * *"   # midnight UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Remove items older than 2 years
        run: node agent/cleanup-archive.js

      - name: Commit if anything was removed
        run: |
          git config user.name "Sade Begam Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/archive.json
          if git diff --staged --quiet; then
            echo "No old items found — nothing to remove."
          else
            git commit -m "Archive cleanup: remove items older than 2 years [vercel skip]"
            git push
          fi
