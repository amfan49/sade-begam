name: News Collector

# Collects candidate official news into draft-week.json every hour for
# human review. Does NOT auto-publish and does NOT deploy to Vercel.
#
# Deployment is handled two ways:
#   1. Vercel GitHub integration: auto-deploys when Amir pushes to main
#   2. approve-single.yml: deploys via CLI after one-click email approval
#
# The bot commits use [vercel skip] to block Vercel's integration on bot pushes.

on:
  schedule:
    - cron: "0 * * * *"   # every hour, every day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect candidate news (last 3 days)
        env:
          DAYS: "3"
        run: node agent/collect.js

      - name: Commit draft if changed
        run: |
          git config user.name "Sade Begam Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/draft-week.json
          if git diff --staged --quiet; then
            echo "No new draft items."
          else
            git commit -m "News draft — $(TZ='Europe/London' date '+%Y-%m-%d %H:%M') [vercel skip]"
            git push
          fi
