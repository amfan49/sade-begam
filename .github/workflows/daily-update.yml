name: Daily News Draft

# Collects candidate official news into a DRAFT file once a day for human
# review. It does NOT publish automatically — you review draft-week.json and
# move approved items into current-week.json (and archive.json).
# Free: GitHub Actions, no paid APIs.
#
# Schedule: 01:00 Europe/London, year-round. GitHub cron is UTC-only and has
# no DST awareness, so we fire at both 00:00 and 01:00 UTC and then let a guard
# step continue only when it is actually 01:00 in London (00:00 UTC in summer
# BST, 01:00 UTC in winter GMT).

on:
  schedule:
    - cron: "0 0 * * *"   # 01:00 London during BST (summer)
    - cron: "0 1 * * *"   # 01:00 London during GMT (winter)
  workflow_dispatch: {}     # lets you run it manually with one click

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Only continue at 01:00 London time
        id: gate
        run: |
          HOUR=$(TZ="Europe/London" date +%H)
          echo "London hour: $HOUR"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "$HOUR" != "01" ]; then
            echo "Not 01:00 in London — skipping this run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect candidate news (last 1 day)
        if: steps.gate.outputs.skip != 'true'
        env:
          DAYS: "1"
        run: node agent/collect.js

      - name: Commit the draft if it changed
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "Sade Begam Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/draft-week.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Daily news draft — $(TZ='Europe/London' date +%Y-%m-%d)"
            git push
          fi
