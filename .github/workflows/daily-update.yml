name: News Draft (3x Daily)

# Collects candidate official news into a DRAFT file three times a day for
# human review. It does NOT publish automatically — you review draft-week.json
# and move approved items into current-week.json (and archive.json).
# Free: GitHub Actions, no paid APIs.
#
# Schedule: 08:00, 14:00, 20:00 Europe/London, year-round.
# GitHub cron is UTC-only and has no DST awareness, so we fire at both UTC
# offsets for each target hour and let a gate step skip runs that fall outside
# the three target London hours (08, 14, 20).

on:
  schedule:
    - cron: "0 7 * * *"   # 08:00 London during BST (summer, UTC+1)
    - cron: "0 8 * * *"   # 08:00 London during GMT (winter, UTC+0)
    - cron: "0 13 * * *"  # 14:00 London during BST
    - cron: "0 14 * * *"  # 14:00 London during GMT
    - cron: "0 19 * * *"  # 20:00 London during BST
    - cron: "0 20 * * *"  # 20:00 London during GMT
  workflow_dispatch: {}     # lets you run it manually with one click

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Only continue at 08:00, 14:00, or 20:00 London time
        id: gate
        run: |
          HOUR=$(TZ="Europe/London" date +%H)
          echo "London hour: $HOUR"
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && \
             [ "$HOUR" != "08" ] && [ "$HOUR" != "14" ] && [ "$HOUR" != "20" ]; then
            echo "Not a target hour in London — skipping this run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect candidate news (last 1 day)
        if: steps.gate.outputs.skip != 'true'
        env:
          DAYS: "1"
        run: node agent/collect.js

      - name: Commit the draft if it changed
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "Sade Begam Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/draft-week.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "News draft — $(TZ='Europe/London' date '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Deploy to Vercel (production)
        if: steps.gate.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_gySo3Th0dmEG0VY22J0UmLRR
          VERCEL_PROJECT_ID: prj_oA3A64H6PtWXzwOwqXr27kMdqe4u
        run: |
          npm install -g vercel@latest --silent
          vercel --prod --yes --token "$VERCEL_TOKEN"
