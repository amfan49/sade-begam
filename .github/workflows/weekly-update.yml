name: Weekly News Update

# Runs ONCE a week — Sunday 08:00 Europe/Berlin — to collect candidate news
# and email Amir a digest with one-click "Publish" links.
#
# This is the only step that runs unattended. Nothing gets published or
# deployed here: approve-single.yml (triggered by Amir clicking a link, or by
# running it manually) is the sole place that commits to current-week.json
# and deploys to Vercel. This keeps GitHub Actions minutes and Vercel builds
# to roughly once a week instead of several times a day.
#
# Two cron entries fire at 06:00 and 07:00 UTC so the run lands at 08:00
# Berlin time across the DST switch; the "gate" job only lets the rest of
# the workflow continue when the Berlin hour is actually 08 (or when
# triggered manually).

on:
  schedule:
    - cron: "0 6 * * 0"   # 08:00 CEST (Berlin summer)
    - cron: "0 7 * * 0"   # 08:00 CET (Berlin winter)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          HOUR=$(TZ='Europe/Berlin' date '+%H')
          if [ "$HOUR" = "08" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  collect:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect candidate news (last 7 days)
        env:
          DAYS: "7"
        run: node agent/collect.js

      - name: Commit draft if changed
        run: |
          git config user.name "Sade Begam Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/draft-week.json
          if git diff --staged --quiet; then
            echo "No new draft items."
          else
            git commit -m "News draft — $(TZ='Europe/Berlin' date '+%Y-%m-%d %H:%M') [vercel skip]"
            git push
          fi

  send-digest:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check for draft items
        id: check
        run: |
          COUNT=$(node -e "const d=require('./public/data/draft-week.json'); console.log(d.items ? d.items.length : 0)")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Draft items found: $COUNT"

      - name: Generate and send digest email
        if: steps.check.outputs.count != '0'
        env:
          APPROVE_SECRET: ${{ secrets.APPROVE_SECRET }}
          SITE_URL: "https://sade-begam.vercel.app"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ITEM_COUNT: ${{ steps.check.outputs.count }}
        run: |
          node agent/digest-email.js > /tmp/digest.html
          node - <<'EOF'
          const https = require("https");
          const fs = require("fs");

          const html = fs.readFileSync("/tmp/digest.html", "utf8");
          const count = process.env.ITEM_COUNT;
          const today = new Date().toLocaleDateString("fa-IR", { year: "numeric", month: "long", day: "numeric" });

          const body = JSON.stringify({
            from: "Sade Begam <onboarding@resend.dev>",
            to: ["amfan49@gmail.com"],
            subject: `📰 Sade Begam — ${count} خبر جدید برای بررسی — ${today}`,
            html: html
          });

          const req = https.request({
            hostname: "api.resend.com",
            path: "/emails",
            method: "POST",
            headers: {
              "Authorization": `Bearer ${process.env.RESEND_API_KEY}`,
              "Content-Type": "application/json",
              "Content-Length": Buffer.byteLength(body)
            }
          }, (res) => {
            let data = "";
            res.on("data", c => data += c);
            res.on("end", () => {
              console.log("Resend response:", res.statusCode, data);
              if (res.statusCode !== 200 && res.statusCode !== 201) process.exit(1);
            });
          });
          req.on("error", (e) => { console.error(e); process.exit(1); });
          req.write(body);
          req.end();
          EOF

      - name: Skip (no draft items)
        if: steps.check.outputs.count == '0'
        run: echo "No draft items this week — email not sent."
