name: Weekly News Draft

# Runs every Saturday and collects candidate official news into a DRAFT
# file for human review. It does NOT publish automatically — you review
# draft-week.json and move approved items into current-week.json.
# Free: GitHub Actions, no paid APIs.

on:
  schedule:
    - cron: "0 9 * * 6"   # Saturdays 09:00 UTC
  workflow_dispatch: {}     # lets you run it manually with one click

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect candidate news (last 7 days)
        run: node agent/collect.js

      - name: Commit the draft if it changed
        run: |
          git config user.name "Sade Begam Bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data/draft-week.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Weekly news draft — $(date +%Y-W%V)"
            git push
          fi
