name: Daily Draft Digest Email

# Sends Amir a daily email at 8:00 AM London time (07:00 UTC in summer).
# Each news item in draft-week.json gets a one-click "Publish" link.
# Uses Resend.com free API (3000 emails/month, no SMTP setup needed).
# Requires secrets: APPROVE_SECRET, RESEND_API_KEY

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 08:00 BST (London summer)
  workflow_dispatch: {}

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check for draft items
        id: check
        run: |
          COUNT=$(node -e "const d=require('./public/data/draft-week.json'); console.log(d.items ? d.items.length : 0)")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Draft items found: $COUNT"

      - name: Generate and send digest email
        if: steps.check.outputs.count != '0'
        env:
          APPROVE_SECRET: ${{ secrets.APPROVE_SECRET }}
          SITE_URL: "https://sade-begam.vercel.app"
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ITEM_COUNT: ${{ steps.check.outputs.count }}
        run: |
          node agent/digest-email.js > /tmp/digest.html
          node - <<'EOF'
          const https = require("https");
          const fs = require("fs");

          const html = fs.readFileSync("/tmp/digest.html", "utf8");
          const count = process.env.ITEM_COUNT;
          const today = new Date().toLocaleDateString("fa-IR", { year: "numeric", month: "long", day: "numeric" });

          const body = JSON.stringify({
            from: "Sade Begam <onboarding@resend.dev>",
            to: ["amfan49@gmail.com"],
            subject: `📰 Sade Begam — ${count} خبر جدید برای بررسی — ${today}`,
            html: html
          });

          const req = https.request({
            hostname: "api.resend.com",
            path: "/emails",
            method: "POST",
            headers: {
              "Authorization": `Bearer ${process.env.RESEND_API_KEY}`,
              "Content-Type": "application/json",
              "Content-Length": Buffer.byteLength(body)
            }
          }, (res) => {
            let data = "";
            res.on("data", c => data += c);
            res.on("end", () => {
              console.log("Resend response:", res.statusCode, data);
              if (res.statusCode !== 200 && res.statusCode !== 201) process.exit(1);
            });
          });
          req.on("error", (e) => { console.error(e); process.exit(1); });
          req.write(body);
          req.end();
          EOF

      - name: Skip (no draft items)
        if: steps.check.outputs.count == '0'
        run: echo "No draft items today — email not sent."
