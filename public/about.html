<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — Sade Begam</title>
  <meta name="description" content="Sade Begam is an independent Persian news media that relays only official news about Iran from official sources — no analysis, nothing added." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="masthead">
    <div class="masthead__inner">
      <a class="logo" href="index.html">
        <span class="logo__mark">SB</span>
        <span class="logo__text">
          <span class="logo__name" id="brandName">Sade Begam</span>
          <span class="logo__tag" id="tagline">Official News. No Filter.</span>
        </span>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <a class="nav__link" href="index.html" id="navHome">Home</a>
        <a class="nav__link" href="about.html" id="navAbout">About</a>
        <a class="nav__link" href="archive.html" id="navArchive">Archive</a>
        <a class="nav__link" href="newsletter.html" id="navNewsletter">Newsletter</a>
        <a class="nav__link" href="orders.html" id="navOrders">Orders</a>
        <a class="nav__link" href="chat.html" id="navChat">AI Chat</a>
        <span class="langswitch">
          <button data-setlang="fa">فا</button>
          <button data-setlang="en">EN</button>
        </span>
        <button class="nav__burger" id="navBurger" aria-label="Menu" aria-expanded="false">☰</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="about card">
      <h1 class="about__title" id="aboutTitle">About Sade Begam</h1>
      <p class="about__lead" id="aboutLead"></p>
      <p class="about__body" id="aboutBody"></p>

      <h2 class="about__subtitle" id="aboutSourcesTitle"></h2>
      <ul class="about__sources" id="aboutSources"></ul>

      <p class="about__focus" id="aboutFocus"></p>

      <hr class="about-divider" />

      <h2 class="about__subtitle" id="aboutFeedsTitle"></h2>
      <ul class="about__sources" id="aboutFeeds" style="list-style: none; padding: 0;"></ul>

      <hr class="about-divider" />

      <section class="impressum-section">
        <h2 class="about__subtitle" id="impressumTitle"></h2>

        <h3 class="impressum__sub" id="impressumOperatorTitle"></h3>
        <p class="impressum__name" id="impressumOperatorName"></p>
        <p id="impressumOperatorNote"></p>
        <p><a href="mailto:hello@sadebegam.com">hello@sadebegam.com</a></p>

        <h3 class="impressum__sub" id="cfTitle"></h3>
        <form id="contactForm" class="sb-form">
          <label class="field-label"><span id="cfNameLabel"></span>
            <input type="text" name="name" class="search" autocomplete="name" />
          </label>
          <label class="field-label"><span id="cfEmailLabel"></span>
            <input type="email" name="email" required class="search" autocomplete="email" />
          </label>
          <label class="field-label"><span id="cfMessageLabel"></span>
            <textarea name="message" rows="4" required class="search" id="cfMessageInput"></textarea>
          </label>
          <button type="submit" class="card__source" id="cfSubmitBtn"></button>
          <p class="muted form-note" id="cfStatus" role="status"></p>
        </form>

        <hr class="about-divider" />

        <h3 class="impressum__sub" id="impressumNewsletterTitle"></h3>
        <p id="impressumNewsletterText"></p>

        <h3 class="impressum__sub" id="impressumDataTitle"></h3>
        <p id="impressumDataText"></p>
      </section>

      <hr class="about-divider" />
      <p class="about__legal" id="aboutLegal"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__note" id="footerNote">We report the news. You draw the conclusions.</p>
      <div class="footer__links">
        <a href="mailto:hello@sadebegam.com">hello@sadebegam.com</a>
        <a href="https://instagram.com/sadeh.begam" target="_blank" rel="noopener noreferrer">@sadeh.begam</a>
        <a href="https://youtube.com/@sadehbegam" target="_blank" rel="noopener noreferrer">@sadehbegam</a>
      </div>
      <p class="footer__today" id="todayDate"></p>
      <p class="footer__legal" id="nonProfitFooter"></p>
      <p class="footer__rights" id="rights">© 2026 Sade Begam. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    document.documentElement.lang = T.htmlLang;
    document.documentElement.dir = T.dir;
    const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };

    set("brandName", T.brandName);
    set("tagline", T.tagline);
    set("navHome", T.navHome);
    set("navAbout", T.navAbout);
    set("navArchive", T.navArchive);
    set("navNewsletter", T.navNewsletter);
    set("navOrders", T.navOrders);
    set("footerNote", T.footerNote);
    set("rights", T.rights);
    sbRenderCommonFooter();

    set("aboutTitle", T.about.title);
    set("aboutLead", T.about.lead);
    set("aboutBody", T.about.body);
    set("aboutSourcesTitle", T.about.sourcesTitle);
    set("aboutFocus", T.about.focus);
    set("aboutLegal", T.nonProfitNotice);

    const ul = document.getElementById("aboutSources");
    T.about.sources.forEach((s) => {
      const li = document.createElement("li");
      li.textContent = s;
      ul.appendChild(li);
    });

    document.querySelectorAll("[data-setlang]").forEach((btn) => {
      if (btn.dataset.setlang === SB_LANG) btn.classList.add("active");
      btn.addEventListener("click", () => setLang(btn.dataset.setlang));
    });

    set("navChat", T.navChat);
    set("aboutFeedsTitle", T.about.officialFeedsTitle);

    // Impressum / Privacy
    set("impressumTitle",           T.impressum.title);
    set("impressumOperatorTitle",   T.impressum.operatorTitle);
    set("impressumOperatorName",    T.impressum.operatorName);
    set("impressumOperatorNote",    T.impressum.operatorNote);
    set("impressumNewsletterTitle", T.impressum.newsletterTitle);
    set("impressumNewsletterText",  T.impressum.newsletterText);
    set("impressumDataTitle",       T.impressum.dataTitle);
    set("impressumDataText",        T.impressum.dataText);

    // Contact form → api/contact.js (emails the site operator; never stores
    // or forwards the visitor's data anywhere else)
    set("cfTitle",       T.impressum.formTitle);
    set("cfNameLabel",   T.impressum.formNameLabel);
    set("cfEmailLabel",  T.impressum.formEmailLabel);
    set("cfMessageLabel", T.impressum.formMessageLabel);
    set("cfSubmitBtn",   T.impressum.formSubmitBtn);
    document.getElementById("cfMessageInput").placeholder = T.impressum.formMessagePlaceholder;

    document.getElementById("contactForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const statusEl = document.getElementById("cfStatus");
      const btn = document.getElementById("cfSubmitBtn");
      btn.disabled = true;
      statusEl.textContent = T.impressum.formSending;
      try {
        const res = await fetch("/api/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: f.get("name") || "",
            email: f.get("email") || "",
            message: f.get("message") || ""
          })
        });
        if (!res.ok) throw new Error("failed");
        statusEl.textContent = T.impressum.formSuccess;
        e.target.reset();
      } catch (_) {
        statusEl.textContent = T.impressum.formError;
      } finally {
        btn.disabled = false;
      }
    });
    fetch("data/sources.json")
      .then((r) => r.json())
      .then((data) => {
        const ul = document.getElementById("aboutFeeds");
        // Group by region
        const byRegion = {};
        (data.feeds || []).forEach((f) => {
          const r = f.region || "Other";
          if (!byRegion[r]) byRegion[r] = [];
          byRegion[r].push(f);
        });
        // Western sources are always listed before Iranian sources.
        const regions = Object.keys(byRegion).sort((a, b) => {
          const wa = a.startsWith("Iran") ? 1 : 0, wb = b.startsWith("Iran") ? 1 : 0;
          return wa - wb;
        });
        regions.forEach((region) => {
          const items = byRegion[region];
          const header = document.createElement("li");
          header.style.cssText = "font-weight:700;color:var(--brand-blue-deep);font-size:13px;text-transform:uppercase;letter-spacing:0.1em;padding:14px 0 4px;list-style:none;";
          header.textContent = region;
          ul.appendChild(header);
          items.forEach((f) => {
            const li = document.createElement("li");
            li.className = "about-feed-item";
            const twLink = f.twitter ? ` <a class="about-feed-tw" href="${f.twitter}" target="_blank" rel="noopener noreferrer" title="X/Twitter">𝕏</a>` : "";
            li.innerHTML = `<div>
                <a class="about-feed-name" href="${f.homepage}" target="_blank" rel="noopener noreferrer">${f.name}</a>${twLink}
                <span class="about-feed-country">${f.country}</span>
              </div>`;
            ul.appendChild(li);
          });
        });
      })
      .catch(() => {});
  </script>
</body>
</html>
