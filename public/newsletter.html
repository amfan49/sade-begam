<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter — Sade Begam</title>
  <meta name="description" content="Subscribe to the free Sade Begam newsletter — official news about Iran." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="masthead">
    <div class="masthead__inner">
      <a class="logo" href="index.html">
        <span class="logo__mark">SB</span>
        <span class="logo__text">
          <span class="logo__name" id="brandName">Sade Begam</span>
          <span class="logo__tag" id="tagline">Official News. No Filter.</span>
        </span>
      </a>
      <nav class="nav">
        <a class="nav__link" href="index.html" id="navHome">Home</a>
        <a class="nav__link" href="about.html" id="navAbout">About</a>
        <a class="nav__link" href="archive.html" id="navArchive">Archive</a>
        <a class="nav__link" href="newsletter.html" id="navNewsletter">Newsletter</a>
        <a class="nav__link" href="orders.html" id="navOrders">Orders</a>
        <span class="langswitch">
          <button data-setlang="fa">فا</button>
          <button data-setlang="en">EN</button>
        </span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card form-block">
      <h1 class="about__title" id="nlTitle">Newsletter</h1>
      <p class="about__body" id="nlIntro"></p>
      <form id="signupForm" class="sb-form">
        <label class="field-label"><span id="nlEmailLabel"></span>
          <input type="email" name="email" required class="search" autocomplete="email" />
        </label>
        <button type="submit" class="card__source" id="nlSignupBtn"></button>
        <p class="muted form-note" id="nlFormNote"></p>
      </form>

      <div id="signupConfirm" class="confirm-panel" hidden>
        <h2 class="about__subtitle" id="nlConfirmTitle"></h2>
        <p class="about__body" id="nlConfirmBody"></p>
        <button type="button" class="card__source" id="nlConfirmAgain"></button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__note" id="footerNote">We report the news. You draw the conclusions.</p>
      <div class="footer__links">
        <a href="mailto:hello@sadebegam.com">hello@sadebegam.com</a>
        <a href="https://instagram.com/sadeh.begam" target="_blank" rel="noopener noreferrer">@sadeh.begam</a>
        <a href="https://youtube.com/@sadehbegam" target="_blank" rel="noopener noreferrer">@sadehbegam</a>
      </div>
      <p class="footer__today" id="todayDate"></p>
      <p class="footer__legal" id="nonProfitFooter"></p>
      <p class="footer__rights" id="rights">© 2026 Sade Begam. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    document.documentElement.lang = T.htmlLang;
    document.documentElement.dir = T.dir;
    const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };

    set("brandName", T.brandName); set("tagline", T.tagline);
    set("navHome", T.navHome); set("navAbout", T.navAbout);
    set("navArchive", T.navArchive);
    set("navNewsletter", T.navNewsletter); set("navOrders", T.navOrders);
    set("footerNote", T.footerNote); set("rights", T.rights);
    sbRenderCommonFooter();

    set("nlTitle", T.newsletter.title);
    set("nlIntro", T.newsletter.intro);
    set("nlEmailLabel", T.newsletter.emailLabel);
    set("nlSignupBtn", T.newsletter.signupBtn);
    set("nlFormNote", T.newsletter.formNote);
    set("nlConfirmTitle", T.newsletter.confirmTitle);
    set("nlConfirmBody", T.newsletter.confirmBody);
    set("nlConfirmAgain", T.newsletter.confirmAgain);

    const form = document.getElementById("signupForm");
    const confirm = document.getElementById("signupConfirm");

    // Step 1 → 2 (double opt-in): opens the visitor's email app pre-filled so
    // the subscription is confirmed by THEM. Nothing is auto-sent or stored.
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = new FormData(e.target).get("email") || "";
      location.href = "mailto:hello@sadebegam.com?subject=" +
        encodeURIComponent("Sade Begam — Confirm newsletter subscription") +
        "&body=" + encodeURIComponent("Please confirm my subscription. Email: " + email);
      form.hidden = true;
      confirm.hidden = false;
    });

    // Let the visitor go back and enter a different address.
    document.getElementById("nlConfirmAgain").addEventListener("click", () => {
      confirm.hidden = true;
      form.hidden = false;
      form.reset();
    });

    document.querySelectorAll("[data-setlang]").forEach((btn) => {
      if (btn.dataset.setlang === SB_LANG) btn.classList.add("active");
      btn.addEventListener("click", () => setLang(btn.dataset.setlang));
    });
  </script>
</body>
</html>
