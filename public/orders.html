<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order specific news — Sade Begam</title>
  <meta name="description" content="Request specific official news about Iran, focused on your topic, delivered by email." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="masthead">
    <div class="masthead__inner">
      <a class="logo" href="index.html">
        <span class="logo__mark">SB</span>
        <span class="logo__text">
          <span class="logo__name" id="brandName">Sade Begam</span>
          <span class="logo__tag" id="tagline">Official News. No Filter.</span>
        </span>
      </a>
      <nav class="nav">
        <a class="nav__link" href="index.html" id="navHome">Home</a>
        <a class="nav__link" href="about.html" id="navAbout">About</a>
        <a class="nav__link" href="archive.html" id="navArchive">Archive</a>
        <a class="nav__link" href="newsletter.html" id="navNewsletter">Newsletter</a>
        <a class="nav__link" href="orders.html" id="navOrders">Orders</a>
        <span class="langswitch">
          <button data-setlang="fa">فا</button>
          <button data-setlang="en">EN</button>
        </span>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card form-block">
      <h1 class="about__title" id="ordTitle"></h1>
      <p class="about__body" id="ordIntro"></p>
      <form id="orderForm" class="sb-form">
        <label class="field-label"><span id="ordNameLabel"></span>
          <input type="text" name="name" required class="search" autocomplete="name" />
        </label>
        <label class="field-label"><span id="ordEmailLabel"></span>
          <input type="email" name="email" required class="search" autocomplete="email" />
        </label>
        <label class="field-label"><span id="ordFocusLabel"></span>
          <textarea name="focus" rows="5" required class="search" id="ordFocusInput"></textarea>
        </label>
        <button type="submit" class="card__source" id="ordSubmitBtn"></button>
        <p class="muted form-note" id="ordNote"></p>
      </form>

      <hr style="margin: 2rem 0; border: none; border-top: 1px solid #ddd;" />
      <p class="about__legal" id="ordSourceNote" style="font-size: 0.9rem; color: #666; margin: 1rem 0;"></p>
      <p class="about__legal" id="ordSupportNote" style="font-size: 0.85rem; color: #999; margin-top: 1rem;"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <p class="footer__note" id="footerNote">We report the news. You draw the conclusions.</p>
      <div class="footer__links">
        <a href="mailto:hello@sadebegam.com">hello@sadebegam.com</a>
        <a href="https://instagram.com/sadeh.begam" target="_blank" rel="noopener noreferrer">@sadeh.begam</a>
        <a href="https://youtube.com/@sadehbegam" target="_blank" rel="noopener noreferrer">@sadehbegam</a>
      </div>
      <p class="footer__today" id="todayDate"></p>
      <p class="footer__legal" id="nonProfitFooter"></p>
      <p class="footer__rights" id="rights">© 2026 Sade Begam. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script>
    document.documentElement.lang = T.htmlLang;
    document.documentElement.dir = T.dir;
    const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };

    set("brandName", T.brandName); set("tagline", T.tagline);
    set("navHome", T.navHome); set("navAbout", T.navAbout);
    set("navArchive", T.navArchive);
    set("navNewsletter", T.navNewsletter); set("navOrders", T.navOrders);
    set("footerNote", T.footerNote); set("rights", T.rights);
    sbRenderCommonFooter();

    set("ordTitle", T.orders.title);
    set("ordIntro", T.orders.intro);
    set("ordNameLabel", T.orders.nameLabel);
    set("ordEmailLabel", T.orders.emailLabel);
    set("ordFocusLabel", T.orders.focusLabel);
    set("ordSubmitBtn", T.orders.submitBtn);
    set("ordNote", T.orders.note);
    set("ordSourceNote", T.orders.sourceNote);
    set("ordSupportNote", T.orders.supportNote);
    document.getElementById("ordFocusInput").placeholder = T.orders.focusPlaceholder;

    document.getElementById("orderForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const body = ["name", "email", "focus"]
        .map((k) => `${k}: ${f.get(k) || ""}`).join("\n");
      location.href = "mailto:hello@sadebegam.com?subject=" +
        encodeURIComponent("Sade Begam — Special news order") + "&body=" + encodeURIComponent(body);
    });

    document.querySelectorAll("[data-setlang]").forEach((btn) => {
      if (btn.dataset.setlang === SB_LANG) btn.classList.add("active");
      btn.addEventListener("click", () => setLang(btn.dataset.setlang));
    });
  </script>
</body>
</html>
